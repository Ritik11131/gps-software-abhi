<div class="map-container">
    <div class="tracking-header" *ngIf="vehicleInfo">
        <div class="vehicle-info">
            <span class="vehicle-no"><i class="fa fa-car"></i> {{vehicleInfo?.device?.vehicleNo}}</span>
            <span class="vehicle-status" [ngClass]="vehicleInfo?.position?.status?.status?.toLowerCase()">
                {{vehicleInfo?.position?.status?.status}}
                <span *ngIf="vehicleInfo?.position?.status?.duration">({{vehicleInfo?.position?.status?.duration}})</span>
            </span>
            <span class="vehicle-speed"><i class="fa fa-tachometer"></i> {{vehicleInfo?.position?.speed || 0}} Km/h</span>
        </div>
    </div>
    <div class="map-frame">
      <div id="map"></div>
    </div>
  </div>
