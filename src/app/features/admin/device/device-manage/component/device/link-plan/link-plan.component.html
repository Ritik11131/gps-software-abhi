<div class="modal-header">
  <h5 class="modal-title">Link Plan to Devices</h5>
  <button type="button" class="close" (click)="cancel()">
    <span>&times;</span>
  </button>
</div>

<div class="modal-body">
  <div class="selected-devices-info">
    <strong>Selected Devices ({{ selectedDevices.length }}):</strong>
    <div class="device-chips">
      <span class="chip" *ngFor="let device of selectedDevices">
        {{ device?.vehicleNo || device?.deviceUid || device?.deviceId || 'N/A' }}
      </span>
    </div>
  </div>

  <div class="form-group mt-3">
    <label>Select Plan</label>
    <select class="form-control" [(ngModel)]="selectedPlanId" [disabled]="isLoading">
      <option [ngValue]="null" disabled>-- Select Plan --</option>
      <option *ngFor="let plan of plans" [ngValue]="plan.id">{{ plan.planName }}</option>
    </select>
    <div *ngIf="isLoading" class="loading-text">Loading plans...</div>
  </div>
</div>

<div class="modal-footer">
  <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
  <button class="btn btn-primary" (click)="linkPlan()" [disabled]="isSubmitting || !selectedPlanId">
    <span *ngIf="isSubmitting">Linking...</span>
    <span *ngIf="!isSubmitting">Link Plan</span>
  </button>
</div>
