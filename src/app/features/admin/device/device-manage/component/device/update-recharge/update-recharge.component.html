<div class="modal-header">
  <h5 class="modal-title">Update Recharge</h5>
  <button type="button" class="close" (click)="cancel()">
    <span>&times;</span>
  </button>
</div>

<div class="modal-body">
  <div class="vehicle-name" *ngIf="vehicleNo">
    <strong>Vehicle:</strong> {{ vehicleNo }}
  </div>

  <div class="form-group">
    <label>Customer Recharge Date</label>
    <input type="text" class="form-control" placeholder="Select Date"
      [(ngModel)]="customerRechargeDate" bsDatepicker [bsConfig]="bsConfig">
  </div>
</div>

<div class="modal-footer">
  <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
  <button class="btn btn-success" (click)="submit()" [disabled]="isSubmitting">
    <span *ngIf="isSubmitting">Updating...</span>
    <span *ngIf="!isSubmitting">Update</span>
  </button>
</div>
